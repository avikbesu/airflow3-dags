[pytest]
testpaths = tests
addopts = -v --tb=short
filterwarnings =
    # cncf-kubernetes provider not yet fully ported to Airflow 3 SDK — not our code
    ignore:The `airflow.hooks.base.BaseHook` attribute is deprecated:UserWarning
    ignore:The `airflow.utils.timezone.utcnow` attribute is deprecated:UserWarning
    ignore:airflow.exceptions.AirflowSkipException is deprecated:UserWarning
    ignore:airflow.exceptions.TaskDeferred is deprecated:UserWarning
    ignore:Module airflow.utils.context is deprecated:UserWarning
    ignore:The `airflow.utils.context.Context` attribute is deprecated:UserWarning
